<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KinderCura</title>
<link rel="stylesheet" href="/css/auth-new-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-sidebar">
            <div class="sidebar-logo">
<img src="/icons/logo.png" alt="KinderCura Logo" class="sidebar-logo-img">                <h1><span style="color:#E8A5A5;">Kinder</span><span style="color:#6B8E6F;">Cura</span></h1>
            </div>
            <p class="sidebar-tagline">Supporting Your Child's Development Journey</p>
            <div class="sidebar-features">
                <div class="feature"><span class="check-icon">✓</span><p>Comprehensive Screening</p></div>
                <div class="feature"><span class="check-icon">✓</span><p>Progress Tracking</p></div>
                <div class="feature"><span class="check-icon">✓</span><p>Expert Recommendations</p></div>
                <div class="feature"><span class="check-icon">✓</span><p>Appointment System</p></div>
            </div>
        </div>

        <div class="auth-form-section">
            <div class="form-container">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account to continue</p>
                </div>

                <div id="errorMsg" style="display:none;background:#fde8e8;color:#c0392b;padding:0.8rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.9rem;"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Username or Email</label>
                        <input type="text" id="identifier" placeholder="username or email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
                            <input type="checkbox" id="rememberMe" style="width:18px;height:18px;">
                            <span style="font-size:0.9rem;">Remember me</span>
                        </label>
                        <a href="#" style="font-size:0.9rem;color:var(--primary);text-decoration:none;">Forgot password?</a>
                    </div>
                    <button type="submit" id="submitBtn" class="btn btn-primary btn-full" style="padding:0.9rem;">Sign In</button>
                </form>

                <div class="form-footer">
                    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>

        <script>
        const API = 'http://localhost:3001/api';

        // If already logged in, redirect to correct dashboard
        const _existingUser = (() => { try { return JSON.parse(localStorage.getItem('kc_user')); } catch { return null; } })();
        if (localStorage.getItem('kc_token') && _existingUser) {
            if (_existingUser.role === 'admin') window.location.href = '/admin/admin-dashboard.html';
            else if (_existingUser.role === 'pediatrician') window.location.href = '/pedia/pediatrician-dashboard.html';
            else window.location.href = '/parent/dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMsg');
            err.style.display = 'none';
            btn.textContent = 'Signing in…';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify((() => {
                        const identifier = document.getElementById('identifier').value.trim();
                        const isEmail = identifier.includes('@');
                        return {
                            email: isEmail ? identifier : '',
                            username: isEmail ? '' : identifier,
                            password: document.getElementById('password').value
                        };
                    })())
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Login failed.');

                // Save session to localStorage
                localStorage.setItem('kc_token', data.token);
                localStorage.setItem('kc_user', JSON.stringify(data.user));
                if (data.childId) localStorage.setItem('kc_childId', data.childId);

                // Redirect based on role
                if (data.user.role === 'admin') {
                    window.location.href = '/admin/admin-dashboard.html';
                } else if (data.user.role === 'pediatrician') {
                    window.location.href = '/pedia/pediatrician-dashboard.html';
                } else {
                    // First parent login should continue to the required pre-assessment.
                    if (data.needsPreAssessment) {
                        localStorage.setItem('kc_preAssessmentRequired', 'true');
                        if (data.preAssessmentChildId || data.childId) {
                            localStorage.setItem('kc_childId', data.preAssessmentChildId || data.childId);
                        }
                        localStorage.removeItem('kc_assessmentId');
                        window.location.href = `/parent/screening.html?mode=pre&source=login&childId=${encodeURIComponent(data.preAssessmentChildId || data.childId || '')}`;
                    } else {
                        localStorage.removeItem('kc_preAssessmentRequired');
                        window.location.href = '/parent/dashboard.html';
                    }
                }

            } catch (error) {
                err.textContent = error.message || 'Cannot connect to server. Make sure the server is running.';
                err.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
