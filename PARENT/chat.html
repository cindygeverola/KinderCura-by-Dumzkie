<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - KinderCura</title>
    <link rel="stylesheet" href="/css/dashboard-new-styles.css">

    <style>
        /* Main two-column chat layout */
        .chat-layout{display:grid;grid-template-columns:280px 1fr;gap:1.5rem;height:calc(100vh - 110px);}

        /* Left conversation list panel */
        .threads-panel{background:white;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden;}
        .threads-header{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);}
        .threads-header h2{font-size:.95rem;color:var(--primary);margin:0 0 .15rem;}
        .threads-header p{font-size:.75rem;color:var(--text-light);margin:0;}
        .threads-list{flex:1;overflow-y:auto;}
        .thread-item{padding:.9rem 1.4rem;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s;display:flex;gap:.7rem;align-items:center;}
        .thread-item:hover{background:var(--bg-primary);}
        .thread-item.active{background:#f0f5f0;border-left:3px solid var(--primary);}
        .thread-avatar{width:38px;height:38px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.82rem;flex-shrink:0;overflow:hidden;}
        .thread-info{flex:1;min-width:0;}
        .thread-name{font-weight:600;font-size:.88rem;color:var(--text-dark);margin:0 0 .12rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .thread-sub{font-size:.75rem;color:var(--text-light);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .thread-badge{background:#e74c3c;color:white;border-radius:50%;min-width:18px;height:18px;font-size:.68rem;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;padding:0 3px;}

        /* Right chat panel */
        .chat-panel{background:white;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden;}

        /* Doctor info header */
        .parent-chat-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:white;display:none;align-items:center;gap:1rem;}
        .pch-doc-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.95rem;flex-shrink:0;overflow:hidden;}
        .pch-doc-info{flex:1;}
        .pch-doc-name{font-size:1rem;font-weight:700;color:var(--text-dark);margin:0 0 .15rem;}
        .pch-doc-spec{font-size:.8rem;color:var(--text-light);margin:0;}
        .pch-online-dot{width:9px;height:9px;border-radius:50%;background:#6B8E6F;flex-shrink:0;box-shadow:0 0 0 2px white,0 0 0 3px #6B8E6F;}

        /* Messages area */
        .chat-messages{flex:1;overflow-y:auto;padding:1.3rem 1.5rem;display:flex;flex-direction:column;gap:.9rem;}
        .msg-row{display:flex;gap:.55rem;align-items:flex-end;}
        .msg-row.mine{flex-direction:row-reverse;}
        .msg-av{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:white;flex-shrink:0;overflow:hidden;}
        .msg-body{display:flex;flex-direction:column;max-width:62%;}
        .msg-bubble{padding:.65rem .95rem;border-radius:14px;font-size:.88rem;line-height:1.48;word-break:break-word;}
        .msg-row.theirs .msg-bubble{background:var(--bg-primary);border-radius:14px 14px 14px 3px;color:var(--text-dark);}
        .msg-row.mine .msg-bubble{background:var(--primary);border-radius:14px 14px 3px 14px;color:white;}
        .msg-time{font-size:.65rem;color:var(--text-light);margin-top:.2rem;}
        .msg-row.mine .msg-time{text-align:right;}

        /* Video preview inside chat bubble */
        .msg-video-wrap{margin-top:.45rem;border-radius:8px;overflow:hidden;background:#111;max-width:240px;}
        .msg-video-wrap video{width:100%;display:block;max-height:150px;}
        .msg-video-label{padding:.25rem .5rem;background:#1a1a1a;color:#aaa;font-size:.68rem;}

        /* Empty and locked states */
        .empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-light);text-align:center;padding:2rem;}
        .locked-notice{background:#fff8e8;border:1px solid #f4d89f;border-radius:10px;padding:1.2rem;margin:1.5rem;font-size:.85rem;color:#7a6030;text-align:center;line-height:1.6;}

        /* Bottom input area */
        .chat-input-area{padding:.9rem 1.4rem;border-top:1px solid var(--border);}
        .video-attach-bar{background:var(--bg-primary);border-radius:8px;padding:.5rem .9rem;margin-bottom:.5rem;display:none;align-items:center;gap:.6rem;}
        .video-attach-bar span{font-size:.8rem;color:var(--text-dark);flex:1;}
        .input-row{display:flex;gap:.55rem;align-items:flex-end;}
        .chat-textarea{flex:1;padding:.65rem .95rem;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:.9rem;resize:none;min-height:42px;max-height:110px;line-height:1.4;}
        .chat-textarea:focus{outline:none;border-color:var(--primary);}
        .attach-btn{width:40px;height:40px;border:2px solid var(--border);background:white;border-radius:10px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .attach-btn:hover{border-color:var(--primary);}
        .send-btn{width:40px;height:40px;background:var(--primary);color:white;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .send-btn:hover{background:var(--primary-dark);}
        .send-btn:disabled{opacity:.5;cursor:not-allowed;}

        /* Upload progress bar */
        .upload-prog{height:4px;background:#e0e0e0;border-radius:4px;margin-bottom:.45rem;display:none;}
        .upload-prog-bar{height:100%;background:var(--primary);border-radius:4px;width:0%;transition:width .3s;}

        /* Mobile layout */
        @media (max-width: 900px){
            .chat-layout{grid-template-columns:1fr;height:auto;}
            .threads-panel{min-height:220px;}
            .msg-body{max-width:78%;}
        }
    </style>
</head>
<body>
<header class="top-nav">
  <div class="nav-container">
    <a href="/parent/dashboard.html" class="logo">
      <img src="/icons/logo.png" alt="KinderCura Logo" class="logo-img">
      <span class="logo-text"><span class="logo-kinder">Kinder</span><span class="logo-cura">Cura</span></span>
    </a>

    <!-- Parent navigation -->
    <nav class="main-nav">
      <a href="/parent/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/parent/results.html" class="nav-link">Results</a>
      <a href="/parent/recommendations.html" class="nav-link">Recommendations</a>
      <a href="/parent/appointments.html" class="nav-link">Appointments</a>
      <a href="/parent/chat.html" class="nav-link active">Chat</a>
      <a href="/parent/custom-questions.html" class="nav-link">Questions</a>
    </nav>

    <div class="nav-right">
      <!-- Notification button -->
      <button class="icon-btn notification-btn" onclick="openNotifications()">
        <img src="/icons/notif_bell.png" class="notification-icon" style="width:24px;height:24px;object-fit:contain;display:block;">
        <span class="notification-badge">0</span>
      </button>

      <!-- Profile menu button -->
      <button class="icon-btn profile-btn" onclick="toggleProfileMenu()">
        <img src="/icons/profile.png" class="profile-icon" id="navProfilePic" style="width:36px;height:36px;border-radius:50%;object-fit:cover;display:block;">
      </button>

      <!-- Profile dropdown -->
      <div class="profile-menu" id="profileMenu" style="display:none;">
        <div class="menu-header"><p id="navWelcome">Welcome</p></div>
        <a href="/parent/profile.html" class="menu-item"><img src="/icons/profile_icon.png" class="menu-icon">Profile</a>
        <a href="/parent/settings.html" class="menu-item"><img src="/icons/settings.png" class="menu-icon">Settings</a>
        <hr style="margin:.5rem 0;">
        <a href="#" class="menu-item logout" onclick="logout(); return false;"><img src="/icons/logout.png" class="menu-icon">Logout</a>
      </div>
    </div>
  </div>
</header>

<div class="dashboard-container" style="padding-top:1rem;">
  <div class="chat-layout">

    <!-- Left side: conversation threads -->
    <div class="threads-panel">
      <div class="threads-header">
        <h2 class="threads-title">
          <img src="/icons/chat.png" alt="Chat Icon" class="threads-title-icon">
          <span>My Conversations</span>
        </h2>
        <p>Approved appointments</p>
      </div>

      <div class="threads-list" id="threadsList">
        <div style="padding:1.5rem;text-align:center;color:var(--text-light);font-size:.85rem;">Loading…</div>
      </div>
    </div>

    <!-- Right side: actual chat -->
    <div class="chat-panel">
      <div class="parent-chat-header" id="parentChatHeader">
        <div class="pch-doc-avatar" id="docAvatar"></div>
        <div class="pch-doc-info">
          <p class="pch-doc-name" id="docName">—</p>
          <p class="pch-doc-spec" id="docSpec"></p>
        </div>
        <div class="pch-online-dot"></div>
      </div>

      <!-- Chat messages -->
      <div class="chat-messages" id="chatMessages">
        <div class="empty-chat">
          <img src="/icons/chatbubble.png" alt="Chat Bubble Icon" style="width:58px;height:58px;object-fit:contain;display:block;margin-bottom:1rem;">
          <p style="font-weight:600;margin-bottom:.4rem;">Select a conversation</p>
          <p style="font-size:.85rem;">Choose an approved appointment from the left to chat with the pediatrician.</p>
        </div>
      </div>

      <!-- Bottom input area -->
      <div class="chat-input-area" id="chatInputArea" style="display:none;">
        <div class="upload-prog" id="uploadProg">
          <div class="upload-prog-bar" id="uploadProgBar"></div>
        </div>

        <!-- Selected video preview before send -->
        <div class="video-attach-bar" id="videoAttachPreview">
          <span>🎥</span>
          <span id="videoAttachName"></span>
          <button onclick="clearAttach()" style="background:none;border:none;cursor:pointer;color:#e74c3c;font-size:1rem;">✕</button>
        </div>

        <div class="input-row">
          <!-- Video attach button -->
          <button class="attach-btn" onclick="document.getElementById('chatVideoInput').click()" title="Attach video">📎</button>
          <input type="file" id="chatVideoInput" accept="video/*" style="display:none;" onchange="handleChatVideo(event)">

          <textarea class="chat-textarea" id="msgInput" placeholder="Type a message…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>

          <!-- Send button -->
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Notifications modal -->
<div class="notifications-modal" id="notificationsModal" style="display:none;">
  <div class="notifications-content">
    <div class="notifications-header">
      <h3>Notifications</h3>
      <button class="close-btn" onclick="closeNotifications()">✕</button>
    </div>
    <div class="notifications-list"></div>
  </div>
</div>

<script src="/api.js"></script>
<script>
/* Make sure only logged-in users can access this page */
requireAuth();

const _user = KC.user();

/* Redirect wrong roles away from parent chat */
if (_user?.role === 'pediatrician') window.location.href = '/pedia/pedia-chat.html';
else if (_user?.role === 'admin') window.location.href = '/admin/admin-dashboard.html';

/* Chat state variables */
let activeApptId = null;
let pollTimer = null;
let lastMsgId = 0;
let pendingVideoFile = null;

/* Small wrapper so all chat requests use your apiFetch with token */
async function chatFetch(url, opts = {}) {
  return apiFetch(url, opts);
}

/* Load conversation list on the left */
async function loadThreads() {
  try {
    const data = await chatFetch('/chat/threads');
    const threads = data.threads || [];
    const tl = document.getElementById('threadsList');

    if (!threads.length) {
      tl.innerHTML = `
        <div style="padding:1.5rem;text-align:center;color:var(--text-light);font-size:.85rem;">
          No conversations yet.<br>
          <a href="/parent/appointments.html" style="color:var(--primary);">Book an appointment first</a>
        </div>`;
      return;
    }

    const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    tl.innerHTML = threads.map(t => {
      const d = new Date(t.appointmentDate);
      const initials = `Dr. ${(t.pediatricianName || '').split(' ').map(w => w[0] || '').join('').substring(0,2).toUpperCase()}`;

      /* Use doctor photo if available, otherwise initials */
      const avatar = t.pedPhoto && t.pedPhoto.startsWith('/uploads/')
        ? `<img src="${t.pedPhoto}" style="width:100%;height:100%;object-fit:cover;">`
        : initials;

      return `
        <div class="thread-item${t.appointmentId == activeApptId ? ' active' : ''}" onclick="openThread(${t.appointmentId})">
          <div class="thread-avatar">${avatar}</div>
          <div class="thread-info">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <p class="thread-name">Dr. ${t.pediatricianName || 'Pediatrician'}</p>
              ${t.unread > 0 ? `<span class="thread-badge">${t.unread}</span>` : ''}
            </div>
            <p class="thread-sub"><img src="/icons/appointment.png" alt="" aria-hidden="true" style="width:1.1em;height:1.1em;object-fit:contain;vertical-align:-0.18em;"> ${M[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}</p>
          </div>
        </div>`;
    }).join('');

    /* Open appointment from URL if passed */
    const urlAppt = new URLSearchParams(window.location.search).get('apptId');
    if (urlAppt && !activeApptId) openThread(parseInt(urlAppt, 10));
    else if (!activeApptId && threads.length) openThread(threads[0].appointmentId);
  } catch (e) {
    document.getElementById('threadsList').innerHTML = `<div style="padding:1rem;color:#c0392b;font-size:.82rem;">${e.message}</div>`;
  }
}

/* Open selected conversation */
async function openThread(apptId) {
  if (pollTimer) clearInterval(pollTimer);

  activeApptId = apptId;
  lastMsgId = 0;

  document.getElementById('chatMessages').innerHTML =
    '<div style="text-align:center;padding:2rem;color:var(--text-light);font-size:.85rem;">Loading…</div>';

  await loadMessages();

  /* Poll every 4 seconds for new messages */
  pollTimer = setInterval(pollMessages, 4000);
}

/* Load all messages of current thread */
async function loadMessages() {
  if (!activeApptId) return;

  try {
    const data = await chatFetch(`/chat/${activeApptId}`);
    const msgs = data.messages || [];
    const info = data.appointmentInfo || {};

    document.getElementById('parentChatHeader').style.display = 'flex';
    document.getElementById('chatInputArea').style.display = 'block';

    /* Show doctor info in chat header */
    document.getElementById('docName').textContent = `Dr. ${info.pedFirst || ''} ${info.pedLast || ''}`.trim();
    document.getElementById('docSpec').textContent = info.pedSpec || 'Pediatrician';

    const av = document.getElementById('docAvatar');
    if (info.pedPhoto && info.pedPhoto.startsWith('/uploads/')) {
      av.innerHTML = `<img src="${info.pedPhoto}" style="width:100%;height:100%;object-fit:cover;">`;
    } else {
      av.textContent = `${(info.pedFirst || 'D')[0]}${(info.pedLast || 'R')[0]}`.toUpperCase();
    }

    renderMessages(msgs);

    if (msgs.length) lastMsgId = msgs[msgs.length - 1].id;

    loadThreads();
  } catch (e) {
    /* If appointment is not approved yet, lock chat */
    if (e.message.includes('not yet available')) {
      document.getElementById('chatMessages').innerHTML =
        '<div class="locked-notice"><img src="/icons/privacy.png" alt="" aria-hidden="true" style="width:1.1em;height:1.1em;object-fit:contain;vertical-align:-0.18em;"> Chat is available once your appointment is approved by the pediatrician.</div>';
      document.getElementById('chatInputArea').style.display = 'none';
      document.getElementById('parentChatHeader').style.display = 'none';
    } else {
      document.getElementById('chatMessages').innerHTML = `<div class="empty-chat">${e.message}</div>`;
    }
  }
}

/* Check if new messages arrived */
async function pollMessages() {
  if (!activeApptId) return;

  try {
    const data = await chatFetch(`/chat/${activeApptId}`);
    const msgs = data.messages || [];

    if (msgs.length && msgs[msgs.length - 1].id !== lastMsgId) {
      renderMessages(msgs);
      lastMsgId = msgs[msgs.length - 1].id;
      loadThreads();
    }
  } catch {}
}

/* Draw messages on screen */
function renderMessages(msgs) {
  const container = document.getElementById('chatMessages');
  const myId = _user.userId || _user.id;

  if (!msgs.length) {
  container.innerHTML = `
    <div class="empty-chat">
      <img src="/icons/chatbubble.png" alt="Chat Bubble Icon" style="width:52px;height:52px;object-fit:contain;display:block;margin-bottom:.8rem;">
      <p style="font-weight:600;">No messages yet</p>
      <p style="font-size:.85rem;">Say hello to get started!</p>
    </div>`;
  return;
}

  container.innerHTML = msgs.map(m => {
    const mine = m.senderId === myId;
    const cls = mine ? 'mine' : 'theirs';
    const timeStr = new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const ini = (m.senderName || '?').split(' ').map(w => w[0] || '').join('').substring(0,2).toUpperCase();

    let avInner;
    if (m.senderPhoto && m.senderPhoto.startsWith('/uploads/')) {
      avInner = `<img src="${m.senderPhoto}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">`;
    } else {
      avInner = `<span style="display:flex;width:32px;height:32px;border-radius:50%;background:var(--primary);color:white;font-weight:700;font-size:.7rem;align-items:center;justify-content:center;">${ini}</span>`;
    }

    /* Show attached video if message has one */
    const videoHtml = m.videoPath ? `
      <div class="msg-video-wrap">
        <video src="${m.videoPath}" controls playsinline></video>
        <div class="msg-video-label">📹 ${m.videoName || 'Video'}</div>
      </div>` : '';

    return `
      <div class="msg-row ${cls}">
        <div class="msg-av">${avInner}</div>
        <div class="msg-body">
          <div class="msg-bubble">${m.message ? `<span>${m.message}</span>` : ''}${videoHtml}</div>
          <div class="msg-time">${timeStr}${mine && m.isRead ? ' ✓✓' : ''}</div>
        </div>
      </div>`;
  }).join('');

  container.scrollTop = container.scrollHeight;
}

/* When parent selects a video file */
function handleChatVideo(e) {
  const f = e.target.files[0];
  if (!f) return;

  /* Limit video size */
  if (f.size > 150 * 1024 * 1024) {
    alert('Video must be under 150 MB.');
    return;
  }

  pendingVideoFile = f;
  document.getElementById('videoAttachName').textContent =
    `${f.name} (${(f.size / 1024 / 1024).toFixed(1)} MB)`;
  document.getElementById('videoAttachPreview').style.display = 'flex';
}

/* Remove selected video before sending */
function clearAttach() {
  pendingVideoFile = null;
  document.getElementById('chatVideoInput').value = '';
  document.getElementById('videoAttachPreview').style.display = 'none';
}

/* Upload video first before sending chat message */
async function uploadChatVideo() {
  if (!pendingVideoFile) return null;

  const fd = new FormData();
  fd.append('video', pendingVideoFile);

  const progWrap = document.getElementById('uploadProg');
  const progBar = document.getElementById('uploadProgBar');
  progWrap.style.display = 'block';
  progBar.style.width = '10%';

  return new Promise(resolve => {
    const xhr = new XMLHttpRequest();

    /* Update progress bar while uploading */
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        progBar.style.width = `${Math.round((e.loaded / e.total) * 100)}%`;
      }
    };

    xhr.onload = () => {
      progWrap.style.display = 'none';
      progBar.style.width = '0%';
      try {
        const r = JSON.parse(xhr.responseText);
        resolve(r.success ? r : null);
      } catch {
        resolve(null);
      }
    };

    xhr.onerror = () => {
      progWrap.style.display = 'none';
      progBar.style.width = '0%';
      resolve(null);
    };

    /* Uses your current backend chat video upload route */
    xhr.open('POST', 'http://localhost:3001/api/videos/chat');
    xhr.setRequestHeader('Authorization', `Bearer ${KC.token()}`);
    xhr.send(fd);
  });
}

/* Send text message and/or uploaded video */
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();

  if (!text && !pendingVideoFile) return;
  if (!activeApptId) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  try {
    let vPath = null;
    let vName = null;
    let vSize = null;

    if (pendingVideoFile) {
      const uploaded = await uploadChatVideo();
      if (!uploaded) {
        throw new Error('Video upload failed.');
      }

      vPath = uploaded.path;
      vName = uploaded.fileName;
      vSize = pendingVideoFile.size;
    }

    await chatFetch(`/chat/${activeApptId}`, {
      method: 'POST',
      body: JSON.stringify({
        message: text || null,
        videoPath: vPath,
        videoName: vName,
        videoSize: vSize
      })
    });

    input.value = '';
    input.style.height = 'auto';
    clearAttach();
    await loadMessages();
  } catch (e) {
    alert(e.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

/* Enter sends message, Shift+Enter makes new line */
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

/* Auto-grow textarea while typing */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

/* Close profile menu when clicking outside */
document.addEventListener('click', e => {
  if (!e.target.closest('.profile-btn')) {
    const menu = document.getElementById('profileMenu');
    if (menu) menu.style.display = 'none';
  }
});

/* Initial page load */
document.addEventListener('DOMContentLoaded', () => {
  initNav();
  loadThreads();
});

/* Stop polling when leaving the page */
window.addEventListener('beforeunload', () => {
  if (pollTimer) clearInterval(pollTimer);
});
</script>
</body>
</html>
