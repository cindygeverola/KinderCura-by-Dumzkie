<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - KinderCura</title>
    <link rel="stylesheet" href="dashboard-new-styles.css">
    <link rel="stylesheet" href="recommendations-styles.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-container">
            <a href="dashboard.html" class="logo"><img src="logo.png" class="logo-img"><span class="logo-text"><span class="logo-kinder">Kinder</span><span class="logo-cura">Cura</span></span></a>
            <nav class="main-nav">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="results.html" class="nav-link">Results</a>
                <a href="recommendations.html" class="nav-link active">Recommendations</a>
                <a href="appointments.html" class="nav-link">Appointments</a>
            </nav>
            <div class="nav-right">
                <button class="icon-btn notification-btn" onclick="openNotifications()"><img src="notif_bell.png" class="notification-icon"><span class="notification-badge">0</span></button>
                <button class="icon-btn profile-btn" onclick="toggleProfileMenu()"><img src="profile.png" class="profile-icon" style="width:36px;height:36px;border-radius:50%;object-fit:cover;display:block;"></button>
                <div class="profile-menu" id="profileMenu" style="display:none;">
                    <div class="menu-header"><p>Welcome, User</p></div>
                    <a href="profile.html" class="menu-item"><img src="profile_icon.png" class="menu-icon">Profile</a>
                    <a href="settings.html" class="menu-item"><img src="settings.png" class="menu-icon">Settings</a>
                    <hr style="margin:0.5rem 0;">
                    <a href="login.html" class="menu-item logout"><img src="logout.png" class="menu-icon">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <div style="background:white;padding:2rem;border-radius:15px;margin-bottom:2rem;box-shadow:0 4px 15px rgba(0,0,0,0.08);">
            <h1 style="margin-bottom:0.5rem;">Personalized Recommendations</h1>
            <p style="color:var(--text-light);" id="recMeta">Based on your child's latest assessment</p>
        </div>
        <div id="recsContent">
            <div style="text-align:center;padding:3rem;background:white;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.08);">
                <p style="color:var(--text-light);">Loading recommendations…</p>
            </div>
        </div>
    </div>

    <div class="notifications-modal" id="notificationsModal" style="display:none;">
        <div class="notifications-content">
            <div class="notifications-header"><h3>Notifications</h3><button class="close-btn" onclick="closeNotifications()">✕</button></div>
            <div class="notifications-list"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        requireAuth();

        const ICONS = { communication:'<img src="/icons/communication.png" alt="" aria-hidden="true" style="width:1.1em;height:1.1em;object-fit:contain;vertical-align:-0.18em;">', social:'<img src="/icons/social.png" alt="" aria-hidden="true" style="width:1.1em;height:1.1em;object-fit:contain;vertical-align:-0.18em;">', cognitive:'<img src="/icons/cognitive.png" alt="" aria-hidden="true" style="width:1.1em;height:1.1em;object-fit:contain;vertical-align:-0.18em;">', motor:'<img src="/icons/motor.png" alt="" aria-hidden="true" style="width:1.1em;height:1.1em;object-fit:contain;vertical-align:-0.18em;">' };
        const PRIORITY_COLORS = { high:'var(--accent-red)', medium:'var(--primary)', low:'var(--primary)' };
        const PRIORITY_LABELS = { high:'Needs Attention', medium:'Monitor Progress', low:'Keep Up Great Work' };

        async function loadRecommendations() {
            const assessmentId = KC.assessmentId();
            if (!assessmentId) {
                document.getElementById('recsContent').innerHTML = `
                    <div style="text-align:center;padding:3rem;background:white;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.08);">
                        <p style="font-size:1.1rem;font-weight:600;margin-bottom:1rem;">No recommendations yet</p>
                        <p style="color:var(--text-light);margin-bottom:1.5rem;">Complete a screening first to receive personalized recommendations.</p>
                        <button class="btn btn-primary" onclick="window.location.href='screening.html'">Start Screening</button>
                    </div>`;
                return;
            }

            try {
                const data = await apiFetch(`/recommendations/${assessmentId}`);
                const recs = data.recommendations;

                let html = '';

                // Urgent consultation banner
                if (data.consultationNeeded) {
                    html += `
                    <div style="background:linear-gradient(135deg,var(--accent) 0%,#F8E5B5 100%);border-radius:15px;padding:2rem;margin-bottom:2rem;color:#6B7967;box-shadow:0 4px 15px rgba(0,0,0,0.12);">
                        <div style="display:flex;align-items:flex-start;gap:1.5rem;">
                            <span style="font-size:2.5rem;">⚠️</span>
                            <div style="flex:1;">
                                <h2 style="margin-bottom:0.5rem;">Schedule Professional Consultation</h2>
                                <p style="margin-bottom:1.5rem;opacity:0.95;">Based on the assessment results, we recommend scheduling a consultation with a pediatrician to discuss your child's development and create a personalized care plan.</p>
                                <button class="btn btn-primary" onclick="window.location.href='appointments.html'" style="background:white;color:var(--accent-red);font-weight:700;">Book Appointment Now</button>
                            </div>
                        </div>
                    </div>`;
                }

                // Domain recommendations
                recs.forEach(r => {
                    const color = PRIORITY_COLORS[r.priority] || 'var(--primary)';
                    const label = PRIORITY_LABELS[r.priority] || '';
                    const icon  = ICONS[r.skill] || '<img src="/icons/recommendations.png" alt="" aria-hidden="true" style="width:1.1em;height:1.1em;object-fit:contain;vertical-align:-0.18em;">';
                    const activities = Array.isArray(r.activities) ? r.activities : [];
                    html += `
                    <div style="background:white;border-radius:15px;padding:2rem;box-shadow:0 4px 15px rgba(0,0,0,0.08);border-left:4px solid ${color};margin-bottom:1.5rem;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                            <h3>${icon} ${r.skill.charAt(0).toUpperCase()+r.skill.slice(1)} Development</h3>
                            <span style="background:${color};color:white;padding:0.5rem 1rem;border-radius:20px;font-size:0.8rem;font-weight:600;">${label}</span>
                        </div>
                        <p style="color:var(--text-light);margin-bottom:1rem;">${r.suggestion}</p>
                        ${activities.length ? `
                        <h4 style="font-weight:600;margin-bottom:0.5rem;">Recommended Activities:</h4>
                        <ul style="color:var(--text-light);padding-left:1.5rem;line-height:1.8;">
                            ${activities.map(a => `<li>${a}</li>`).join('')}
                        </ul>` : ''}
                    </div>`;
                });

                // Actions
                html += `
                <div style="background:white;border-radius:15px;padding:2rem;box-shadow:0 4px 15px rgba(0,0,0,0.08);margin-top:1rem;">
                    <h3 style="margin-bottom:1.5rem;color:var(--primary);">Next Steps</h3>
                    <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                        <button class="btn btn-primary" onclick="window.location.href='appointments.html'">Schedule Appointment</button>
                        <button class="btn btn-secondary" onclick="window.location.href='results.html'">Back to Results</button>
                        <button class="btn btn-secondary" onclick="window.location.href='screening.html'">New Screening</button>
                    </div>
                </div>`;

                document.getElementById('recsContent').innerHTML = html;

            } catch (e) {
                document.getElementById('recsContent').innerHTML = `
                    <div style="text-align:center;padding:2rem;background:white;border-radius:15px;">
                        <p style="color:red;">Failed to load recommendations: ${e.message}</p>
                        <button class="btn btn-secondary" onclick="loadRecommendations()" style="margin-top:1rem;">Retry</button>
                    </div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadRecommendations);
    </script>
</body>
</html>
